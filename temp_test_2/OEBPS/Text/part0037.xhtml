		<div>
			<p>すずの木くろ（すずのき　くろ）</p>
			<p>埼玉県在住の兼業作家。好んで読むものは第二次世界大戦のノンフィクション戦記と架空戦記だが、自身で執筆する作品はファンタジーものばかり。（二〇一四年八月現在）</p>
			<p>　</p>
			<p>イラストレーション</p>
			<p>黒獅子（くろじし）</p>
			<p>熊本県出身、東京都在住。シリーズ「ゲート―自衛隊 彼の地にて、斬く戦えり」（アルファポリス文庫）のイラストレーションなどを担当しています。（二〇一四年八月現在）</p>
		</div>
