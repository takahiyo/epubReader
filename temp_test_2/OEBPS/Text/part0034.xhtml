		<title>第７章</title>
		<link href="../Styles/style0004.css" rel="stylesheet" type="text/css"/>
	</head><body class="p-text">
		<div>
			<p>　今までグレイシオールという遠い存在だと思っていた一良が、実は普通の人間だという事実を知り、バレッタは嬉しくてたまらなかった。</p>
			<p>　手を伸ばせば、簡単に触れることのできる距離。</p>
			<p>　その言葉が、バレッタの中で特別な意味を持つことになった瞬間だった。</p>
		</div>
