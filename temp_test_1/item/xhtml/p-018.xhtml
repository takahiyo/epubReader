<div class="main">

<p>　最強の眷属たち──その経験値を一人に集めたら、史上最速で魔王が爆誕<span class="tcy">!?</span></p>
<p>　精神力のステータスを育てた主人公レアが手に入れたのは、隠しスキル『使役』。それは、眷属化したキャラの獲得経験値を自分に集約するという、とんでもないスキルだった。</p>
<p>　レイドボス級のモンスターさえ多彩な精神魔法で屈服させ、次々眷属を増やしたレアは、増え続ける経験値で自身と配下を強化！</p>
<p>　自分だけの最強軍団を構築し、ついにはこの世界における「特定災害生物」に判定されてしまい……？</p>
<p>　せっかく魔王になったことだし滅ぼしてみますか、人類を！</p>
